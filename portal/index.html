<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quranic Arabic Learning Portal</title>
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2d8f55;
    --green-pale: #e8f5ee;
    --gold: #c9a84c;
    --gold-light: #f0d898;
    --dark: #1a1a1a;
    --mid: #444;
    --muted: #888;
    --bg: #f7f5f0;
    --card: #ffffff;
    --border: #e0dbd0;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
  body.rtl { direction: rtl; }

  /* Nav */
  nav {
    background: var(--green);
    color: white;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .nav-title { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .nav-title .arabic-title { font-size: 1.2rem; color: var(--gold-light); }
  .lang-switcher { display: flex; gap: 6px; }
  .lang-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.4);
    background: transparent; color: white; cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .lang-btn:hover { background: rgba(255,255,255,0.15); }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 600; }

  /* Layout */
  .layout { display: flex; height: calc(100vh - 60px); overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-section {
    padding: 10px 16px 4px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Level header in sidebar */
  .level-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    user-select: none;
  }
  .level-header:hover { background: var(--green-pale); }
  .level-header.active { background: var(--green-pale); border-left-color: var(--green); }
  .level-icon {
    width: 32px; height: 32px; border-radius: 7px;
    background: var(--green-pale); display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: var(--green); flex-shrink: 0; font-weight: bold;
  }
  .level-header.active .level-icon { background: var(--green); color: white; }
  .level-header-text { flex: 1; }
  .level-name { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
  .level-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .chevron {
    font-size: 0.65rem;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(90deg); }

  /* Week items in sidebar */
  .lesson-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 16px 7px 28px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }
  .lesson-item:hover { background: var(--green-pale); }
  .lesson-item.active { background: var(--green-pale); border-left-color: var(--green); }
  .lesson-week-badge {
    font-size: 0.65rem; font-weight: 700; color: var(--green);
    background: var(--green-pale); border-radius: 4px;
    padding: 1px 5px; flex-shrink: 0; margin-top: 1px;
    border: 1px solid rgba(26,107,60,0.2);
  }
  .lesson-item.active .lesson-week-badge { background: var(--green); color: white; }
  .lesson-item-title { font-size: 0.78rem; color: var(--mid); line-height: 1.4; }
  .lesson-item.active .lesson-item-title { color: var(--dark); font-weight: 500; }

  /* Reference items */
  .ref-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer; transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .ref-item:hover { background: var(--green-pale); }
  .ref-item.active { background: var(--green-pale); border-left-color: var(--green); }
  .ref-icon {
    width: 32px; height: 32px; border-radius: 7px;
    background: #fef9ee; display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; color: var(--gold); flex-shrink: 0; font-weight: bold;
    border: 1px solid #f0dfa0;
  }
  .ref-item.active .ref-icon { background: var(--gold); color: white; border-color: var(--gold); }
  .ref-name { font-size: 0.85rem; font-weight: 500; }

  /* Main content */
  .main { flex: 1; overflow-y: auto; padding: 0; }

  /* Welcome screen */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 40px; text-align: center;
  }
  .welcome-bismillah { font-size: 2rem; color: var(--green); margin-bottom: 16px; font-family: serif; }
  .welcome h1 { font-size: 1.6rem; color: var(--dark); margin-bottom: 12px; }
  .welcome p { color: var(--muted); max-width: 440px; line-height: 1.7; }

  /* Section header in main */
  .topic-header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
    color: white; padding: 28px 32px;
  }
  .topic-header h2 { font-size: 1.4rem; margin-bottom: 6px; }
  .topic-header p { opacity: 0.85; font-size: 0.9rem; line-height: 1.6; }
  .topic-header .week-num {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.7; margin-bottom: 6px;
  }

  .section { padding: 24px 32px; }
  .section-title {
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Level overview — lesson cards grid */
  .lesson-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .lesson-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lesson-card:hover { border-color: var(--green); box-shadow: var(--shadow); transform: translateY(-1px); }
  .lesson-card-week {
    font-size: 0.68rem; font-weight: 700; color: var(--green);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .lesson-card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.4; color: var(--dark); }
  .lesson-card-arrow { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* PDF grid */
  .pdf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .pdf-card {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
    text-decoration: none; color: var(--dark);
    transition: all 0.15s;
  }
  .pdf-card:hover { border-color: var(--green); box-shadow: var(--shadow); transform: translateY(-1px); }
  .pdf-icon { font-size: 1.4rem; flex-shrink: 0; }
  .pdf-name { font-size: 0.84rem; font-weight: 500; line-height: 1.3; }

  /* Practice section */
  .practice-start {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; text-align: center;
    box-shadow: var(--shadow);
  }
  .practice-start h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--green); }
  .practice-start p { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
  .btn-primary {
    background: var(--green); color: white; border: none;
    padding: 12px 28px; border-radius: 24px; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent; color: var(--green); border: 1.5px solid var(--green);
    padding: 10px 22px; border-radius: 24px; font-size: 0.9rem;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--green-pale); }

  /* Question card */
  .question-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
  }
  .q-progress { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
  .q-progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .q-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
  .q-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 14px;
  }
  .badge-translation { background: #e8f0fe; color: #1a56db; }
  .badge-grammar { background: #fef3e2; color: #b45309; }
  .badge-vocabulary { background: #f0fdf4; color: #166534; }
  .badge-pronunciation { background: #fdf4ff; color: #7c3aed; }
  .badge-factual { background: #f1f5f9; color: #475569; }

  .q-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
  .answer-area {
    width: 100%; min-height: 80px; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.95rem; resize: vertical; font-family: inherit;
    line-height: 1.6; transition: border-color 0.2s;
  }
  .answer-area:focus { outline: none; border-color: var(--green); }
  .q-actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
  .q-actions .spacer { flex: 1; }

  /* Feedback */
  .feedback-box {
    margin-top: 20px; padding: 16px 18px;
    border-radius: 8px; border-left: 4px solid var(--green);
    background: var(--green-pale); font-size: 0.92rem; line-height: 1.7;
    white-space: pre-wrap;
  }
  .feedback-box.loading { color: var(--muted); font-style: italic; }
  .feedback-box.error { border-color: #dc2626; background: #fef2f2; color: #991b1b; }
  .feedback-arabic { font-size: 1.2rem; font-family: 'Noto Naskh Arabic', serif; direction: rtl; }

  /* Score card */
  .score-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px; text-align: center;
    box-shadow: var(--shadow);
  }
  .score-num { font-size: 3.5rem; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 8px; }
  .score-label { font-size: 1rem; color: var(--muted); margin-bottom: 24px; }
  .score-actions { display: flex; gap: 12px; justify-content: center; }

  /* Quiz */
  .quiz-setup {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
  }
  .quiz-setup h3 { font-size: 1.15rem; margin-bottom: 8px; color: var(--green); }
  .quiz-setup p { color: var(--mid); font-size: 0.9rem; margin-bottom: 18px; line-height: 1.6; }
  .quiz-options { display: flex; flex-wrap: wrap; gap: 18px; margin: 16px 0 22px; }
  .quiz-option-group { display: flex; flex-direction: column; gap: 6px; }
  .quiz-option-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .quiz-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .quiz-pill {
    padding: 6px 14px; border-radius: 16px; border: 1.5px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
  }
  .quiz-pill:hover { border-color: var(--green); }
  .quiz-pill.active { background: var(--green); color: white; border-color: var(--green); }

  .quiz-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
  }
  .quiz-arabic {
    font-size: 2.4rem; text-align: center; padding: 28px 16px;
    background: var(--green-pale); border-radius: 10px; margin: 12px 0 24px;
    color: var(--green); font-family: 'Noto Naskh Arabic', 'Traditional Arabic', serif;
    direction: rtl; line-height: 1.6;
  }
  .quiz-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 600px) { .quiz-choices { grid-template-columns: 1fr; } }
  .quiz-choice {
    padding: 14px 16px; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 0.95rem; text-align: left;
    transition: all 0.15s; line-height: 1.4;
  }
  .quiz-choice:hover:not(:disabled) { border-color: var(--green); background: var(--green-pale); }
  .quiz-choice:disabled { cursor: default; }
  .quiz-choice.correct { border-color: var(--green); background: #d4f1de; color: #0e4f29; font-weight: 600; }
  .quiz-choice.wrong { border-color: #dc2626; background: #fef2f2; color: #991b1b; }
  .quiz-source {
    margin-top: 16px; padding: 10px 14px; background: var(--bg); border-radius: 6px;
    font-size: 0.78rem; color: var(--muted);
  }

  /* Verse Analysis (I'rab) */
  .irab-input {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow);
  }
  .irab-textarea {
    width: 100%; min-height: 100px; padding: 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 1.4rem; line-height: 1.8; resize: vertical;
    font-family: 'Noto Naskh Arabic', 'Traditional Arabic', serif;
    direction: rtl; text-align: right; color: var(--green);
    background: var(--green-pale);
  }
  .irab-textarea:focus { outline: none; border-color: var(--green); }
  .irab-actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
  .irab-actions .spacer { flex: 1; }

  .irab-results { margin-top: 24px; }
  .irab-translation {
    padding: 14px 18px; background: var(--green-pale);
    border-left: 4px solid var(--green); border-radius: 6px;
    margin-bottom: 18px; font-size: 0.95rem; line-height: 1.6;
  }
  body.rtl .irab-translation { border-left: none; border-right: 4px solid var(--green); }

  .irab-words {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .irab-word {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .irab-word-ar {
    font-size: 1.7rem; font-family: 'Noto Naskh Arabic', serif;
    direction: rtl; text-align: center; color: var(--green);
    padding: 8px 0; line-height: 1.4;
  }
  .irab-word-translit {
    font-size: 0.78rem; color: var(--muted); text-align: center;
    font-style: italic; margin-top: -4px;
  }
  .irab-word-meaning { font-size: 0.92rem; font-weight: 500; text-align: center; }
  .irab-word-grammar {
    font-size: 0.78rem; color: var(--mid); padding: 8px 0;
    border-top: 1px dashed var(--border); display: grid;
    grid-template-columns: auto 1fr; gap: 4px 10px;
  }
  .irab-word-grammar dt { font-weight: 700; color: var(--muted); }
  .irab-word-grammar dd { color: var(--mid); }
  .irab-refs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .irab-ref-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 12px;
    background: var(--green-pale); color: var(--green);
    border: 1px solid rgba(26,107,60,0.25);
    font-size: 0.74rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .irab-ref-chip:hover { background: var(--green); color: white; }
  .irab-ref-chip[title]:hover::after { content: ''; }
  .irab-notes {
    margin-top: 18px; padding: 12px 16px; background: var(--bg);
    border-radius: 8px; font-size: 0.85rem; color: var(--mid); line-height: 1.6;
  }

  /* Spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RTL adjustments */
  body.rtl .sidebar { border-right: none; border-left: 1px solid var(--border); }
  body.rtl .level-header,
  body.rtl .lesson-item,
  body.rtl .ref-item { border-left: none; border-right: 3px solid transparent; }
  body.rtl .level-header.active,
  body.rtl .lesson-item.active,
  body.rtl .ref-item.active { border-right-color: var(--green); }
  body.rtl .lesson-item { padding: 7px 28px 7px 16px; }
  body.rtl .feedback-box { border-left: none; border-right: 4px solid var(--green); }
  body.rtl .section-title::after { display: none; }
  body.rtl .section-title::before { content: ''; flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 700px) {
    .sidebar { width: 240px; min-width: 240px; }
    .section { padding: 16px; }
    .topic-header { padding: 20px 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-title">
    <span class="arabic-title">بِسْمِ اللَّهِ</span>
    <span id="nav-label">Quranic Arabic</span>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('tr')">TR</button>
    <button class="lang-btn" onclick="setLang('ar')">AR</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      <h1 id="welcome-h1">Quranic Arabic Learning Portal</h1>
      <p id="welcome-p">Select a level from the sidebar to explore its lessons, or choose a reference topic to browse vocabulary and grammar materials.</p>
    </div>
  </main>
</div>

<script src="data.js"></script>
<script src="vocab.js" onerror="window.VOCAB_POOL = null;"></script>
<script src="lessons_index.js" onerror="window.LESSON_INDEX = null;"></script>
<script>
if (typeof VOCAB_POOL === 'undefined') { window.VOCAB_POOL = null; }
if (typeof LESSON_INDEX === 'undefined') { window.LESSON_INDEX = null; }
</script>

const t = key => I18N[lang][key];

// ─── State ────────────────────────────────────────────────────────────────────

let lang = 'en';
let expandedLevel = null;
let currentView = null; // { type: 'level'|'lesson'|'reference', level, lesson, ref }
let practiceMode = false;
let questionIndex = 0;

// ─── Language ─────────────────────────────────────────────────────────────────

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.documentElement.lang = l;
  document.body.classList.toggle('rtl', l === 'ar');
  document.getElementById('nav-label').textContent = I18N[l].navLabel;
  renderSidebar();
  if (!currentView) {
    document.getElementById('welcome-h1').textContent = I18N[l].welcomeH1;
    document.getElementById('welcome-p').textContent = I18N[l].welcomeP;
  } else if (currentView.type === 'level') {
    renderLevelOverview(currentView.level);
  } else if (currentView.type === 'lesson') {
    if (practiceMode) renderPractice();
    else renderLesson(currentView.level, currentView.lesson);
  } else if (currentView.type === 'reference') {
    if (currentView.ref.quiz) renderQuizSetup(currentView.ref);
    else if (currentView.ref.irab) renderIrab(currentView.ref);
    else renderReference(currentView.ref);
  }
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────

function renderSidebar() {
  const levelIcons = { level1: '١', level2: '٢', level3: '٣' };
  let html = '';

  html += `<div class="sidebar-section">${t('groupLessons')}</div>`;

  for (const level of LEVELS) {
    const isExpanded = expandedLevel === level.id;
    const isActive = currentView && currentView.type === 'level' && currentView.level && currentView.level.id === level.id;
    html += `
      <div class="level-header ${isActive && !currentView.lesson ? 'active' : ''}" onclick="clickLevel('${level.id}')">
        <div class="level-icon">${levelIcons[level.id]}</div>
        <div class="level-header-text">
          <div class="level-name">${level.title[lang]}</div>
          <div class="level-sub">${level.lessons.length} ${t('lessons')}</div>
        </div>
        <div class="chevron ${isExpanded ? 'open' : ''}">▸</div>
      </div>`;

    if (isExpanded) {
      for (let i = 0; i < level.lessons.length; i++) {
        const lesson = level.lessons[i];
        const isLessonActive = currentView && currentView.type === 'lesson' && currentView.lesson === lesson;
        html += `
          <div class="lesson-item ${isLessonActive ? 'active' : ''}" onclick="clickLesson('${level.id}', ${i})">
            <div class="lesson-week-badge">${t('week')} ${lesson.week}</div>
            <div class="lesson-item-title">${lesson.title[lang]}</div>
          </div>`;
      }
    }
  }

  html += `<div class="sidebar-section" style="margin-top:8px">${t('groupReference')}</div>`;

  for (const ref of REFERENCE_TOPICS) {
    const isActive = currentView && currentView.type === 'reference' && currentView.ref && currentView.ref.id === ref.id;
    html += `
      <div class="ref-item ${isActive ? 'active' : ''}" onclick="clickReference('${ref.id}')">
        <div class="ref-icon">${ref.icon}</div>
        <div class="ref-name">${ref.title[lang]}</div>
      </div>`;
  }

  document.getElementById('sidebar').innerHTML = html;
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function clickLevel(levelId) {
  const level = LEVELS.find(l => l.id === levelId);
  if (expandedLevel === levelId) {
    expandedLevel = null;
    currentView = null;
    renderSidebar();
    showWelcome();
  } else {
    expandedLevel = levelId;
    currentView = { type: 'level', level };
    practiceMode = false;
    renderSidebar();
    renderLevelOverview(level);
  }
}

function clickLesson(levelId, index) {
  const level = LEVELS.find(l => l.id === levelId);
  const lesson = level.lessons[index];
  expandedLevel = levelId;
  currentView = { type: 'lesson', level, lesson };
  practiceMode = false;
  questionIndex = 0;
  renderSidebar();
  renderLesson(level, lesson);
}

function clickReference(refId) {
  const ref = REFERENCE_TOPICS.find(r => r.id === refId);
  expandedLevel = null;
  currentView = { type: 'reference', ref };
  practiceMode = false;
  renderSidebar();
  if (ref.quiz) renderQuizSetup(ref);
  else if (ref.irab) renderIrab(ref);
  else renderReference(ref);
}

  const encodedPath = lesson.pdf.split('/').map(encodeURIComponent).join('/');

  main.innerHTML = `
    <div class="topic-header">
      <h2>${ref.title[lang]}</h2>
      <p>${ref.desc[lang]}</p>
    </div>
    <div class="section">
      <div class="section-title">${t('materials')}</div>

// ─── Practice ─────────────────────────────────────────────────────────────────

function startPractice() {
  practiceMode = true;
  questionIndex = 0;
  renderPractice();
}

function renderPractice() {
  const lesson = currentView.lesson;
  const q = lesson.questions[questionIndex];
  const total = lesson.questions.length;
  const pct = Math.round((questionIndex / total) * 100);
  const level = currentView.level;

  const badgeClass = {
    translation: 'badge-translation',
    grammar: 'badge-grammar',
    vocabulary: 'badge-vocabulary',
    pronunciation: 'badge-pronunciation',
    factual: 'badge-factual',
  }[q.type] || 'badge-factual';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-header">
      <div class="week-num">${level.title[lang]} · ${t('week')} ${lesson.week}</div>
      <h2>${lesson.title[lang]}</h2>
      <p>${t('practice')}</p>
    </div>
    <div class="section">
      <div class="question-card">
        <div class="q-progress">${t('question')} ${questionIndex + 1} ${t('of')} ${total}</div>
        <div class="q-progress-bar"><div class="q-progress-fill" style="width:${pct}%"></div></div>
        <span class="q-badge ${badgeClass}">${q.type}</span>
        <div class="q-text">${escapeHtml(q.q)}</div>
        <textarea class="answer-area" id="answer-input" placeholder="${t('yourAnswer')}"></textarea>
        <div class="q-actions">
          <button class="btn-secondary" onclick="backToLesson()">${t('backToTopic')}</button>
          <span class="spacer"></span>
          <button class="btn-primary" id="submit-btn" onclick="submitAnswer()">${t('submitAnswer')}</button>
        </div>
        <div id="feedback-area"></div>
        <div id="next-area"></div>
      </div>
    </div>`;

  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) submitAnswer();
  });
}

async function submitAnswer() {
  const answerEl = document.getElementById('answer-input');
  const answer = answerEl.value.trim();
  if (!answer) { answerEl.focus(); return; }

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  answerEl.disabled = true;

  const feedbackArea = document.getElementById('feedback-area');
  feedbackArea.innerHTML = `<div class="feedback-box loading"><span class="spinner"></span> ${t('thinking')}</div>`;

  const lesson = currentView.lesson;
  const level = currentView.level;
  const q = lesson.questions[questionIndex];

  try {
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q.q,
        answer,
        expected: q.expected,
        topic: `${level.title['en']} — Week ${lesson.week}: ${lesson.title['en']}`,
        language: lang,
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    feedbackArea.innerHTML = `<div class="feedback-box ${lang === 'ar' ? 'feedback-arabic' : ''}">${escapeHtml(data.feedback)}</div>`;
  } catch (err) {
    feedbackArea.innerHTML = `<div class="feedback-box error">Error: ${escapeHtml(err.message)}</div>`;
  }

  const isLast = questionIndex === lesson.questions.length - 1;
  const nextArea = document.getElementById('next-area');
  nextArea.innerHTML = `<div class="q-actions" style="margin-top:16px">
    <span class="spacer"></span>
    <button class="btn-primary" onclick="${isLast ? 'showScore()' : 'nextQuestion()'}">${isLast ? t('finishPractice') : t('nextQuestion')}</button>
  </div>`;
}

function nextQuestion() {
  questionIndex++;
  renderPractice();
  document.getElementById('main').scrollTop = 0;
}

function showScore() {
  const lesson = currentView.lesson;
  const level = currentView.level;
  const total = lesson.questions.length;
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-header">
      <div class="week-num">${level.title[lang]} · ${t('week')} ${lesson.week}</div>
      <h2>${lesson.title[lang]}</h2>

}

// ─── Vocabulary Quiz ──────────────────────────────────────────────────────────

let quizConfig = { direction: 'tr', length: 10, scope: 'all' };
let quizState = null; // { pool, items, idx, score, answered }

function filterPool(scope) {
  if (!VOCAB_POOL) return [];
  const all = VOCAB_POOL.filter(e => e.ar && e.tr);
  if (scope === 'answerkeys') return all.filter(e => /Answer Key|ANSWER KEY/i.test(e.source || ''));
  if (scope === 'surah') return all.filter(e => /Sûresi|Surah/i.test(e.source || '') && !/Answer Key/i.test(e.source || ''));
  return all;
}

function renderQuizSetup(ref) {
  const main = document.getElementById('main');

  if (!VOCAB_POOL) {
    main.innerHTML = `
      <div class="topic-header">
        <h2>${ref.title[lang]}</h2>
        <p>${ref.desc[lang]}</p>
      </div>
      <div class="section">
        <div class="practice-start" style="text-align:left">
          <p style="color:var(--mid);line-height:1.7">${escapeHtml(t('quizNotReady'))}</p>
          <pre style="margin-top:14px;background:#1a1a1a;color:#a8e6c0;padding:14px 16px;border-radius:8px;font-size:0.82rem;overflow-x:auto"><code>cd portal
export ANTHROPIC_API_KEY=...
venv/bin/python build_vocab.py</code></pre>
        </div>
      </div>`;
    return;
  }

  const pool = filterPool(quizConfig.scope);
  const lengths = [10, 20, 50];
  const scopes = [
    { id: 'all', label: t('quizScopeAll') },
    { id: 'answerkeys', label: t('quizScopeAnswerKeys') },
    { id: 'surah', label: t('quizScopeSurah') },
  ];
  const directions = [
    { id: 'tr', label: t('quizDirArTr') },
    { id: 'en', label: t('quizDirArEn') },
  ];

  const pillsHtml = (items, current, key) => items.map(it =>
    `<button class="quiz-pill ${current === it.id ? 'active' : ''}" onclick="setQuizConfig('${key}','${it.id}')">${escapeHtml(it.label || it.id)}</button>`
  ).join('');
  const lengthPills = lengths.map(n =>
    `<button class="quiz-pill ${quizConfig.length === n ? 'active' : ''}" onclick="setQuizConfig('length',${n})">${n}</button>`
  ).join('');

  main.innerHTML = `
    <div class="topic-header">
      <h2>${ref.title[lang]}</h2>
      <p>${ref.desc[lang]}</p>
    </div>
    <div class="section">
      <div class="quiz-setup">
        <h3>${ref.title[lang]}</h3>
        <p>${t('quizPoolSize')(pool.length)}</p>
        <div class="quiz-options">
          <div class="quiz-option-group">
            <span class="quiz-option-label">${t('quizDirection')}</span>
            <div class="quiz-pills">${pillsHtml(directions, quizConfig.direction, 'direction')}</div>
          </div>
          <div class="quiz-option-group">
            <span class="quiz-option-label">${t('quizLength')}</span>
            <div class="quiz-pills">${lengthPills}</div>
          </div>
          <div class="quiz-option-group">
            <span class="quiz-option-label">${t('quizScope')}</span>
            <div class="quiz-pills">${pillsHtml(scopes, quizConfig.scope, 'scope')}</div>
          </div>
        </div>
        <button class="btn-primary" onclick="startQuiz()" ${pool.length < 4 ? 'disabled' : ''}>${t('quizStart')}</button>
      </div>
    </div>`;
}

function setQuizConfig(key, value) {
  quizConfig[key] = value;
  renderQuizSetup(currentView.ref);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = filterPool(quizConfig.scope);
  if (pool.length < 4) return;
  const items = shuffle(pool).slice(0, Math.min(quizConfig.length, pool.length));
  quizState = { pool, items, idx: 0, score: 0, answered: false };
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const { items, idx, score, pool } = quizState;
  const total = items.length;
  const item = items[idx];
  const meaningKey = quizConfig.direction; // 'tr' or 'en'

  // Build distractors: 3 random different entries with a meaning value
  const others = shuffle(pool.filter(e => e.ar !== item.ar && e[meaningKey] && e[meaningKey] !== item[meaningKey])).slice(0, 3);
  const choices = shuffle([item, ...others]);

  const ref = currentView.ref;
  const main = document.getElementById('main');
  const pct = Math.round((idx / total) * 100);

  main.innerHTML = `
    <div class="topic-header">
      <h2>${ref.title[lang]}</h2>
      <p>${t('question')} ${idx + 1} ${t('of')} ${total} · ${t('quizScore')}: ${score}</p>
    </div>
    <div class="section">
      <div class="quiz-card">
        <div class="q-progress-bar"><div class="q-progress-fill" style="width:${pct}%"></div></div>
        <div class="quiz-arabic">${escapeHtml(item.ar)}</div>
        <div class="quiz-choices" id="quiz-choices">
          ${choices.map((c, i) => `<button class="quiz-choice" data-correct="${c.ar === item.ar}" onclick="answerQuiz(this, ${i})">${escapeHtml(c[meaningKey] || '—')}</button>`).join('')}
        </div>
        <div id="quiz-feedback"></div>
      </div>
    </div>`;
  quizState.answered = false;
  quizState.currentItem = item;
}

function answerQuiz(btn, choiceIdx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const isCorrect = btn.dataset.correct === 'true';
  const item = quizState.currentItem;
  if (isCorrect) quizState.score++;

  document.querySelectorAll('#quiz-choices .quiz-choice').forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });

  const meaningKey = quizConfig.direction;
  const otherKey = meaningKey === 'tr' ? 'en' : 'tr';
  const fb = document.getElementById('quiz-feedback');
  fb.innerHTML = `
    <div class="quiz-source">
      <strong>${escapeHtml(item.ar)}</strong> — ${escapeHtml(item[meaningKey] || '')}
      ${item[otherKey] ? ` <span style="opacity:0.7">· ${escapeHtml(item[otherKey])}</span>` : ''}
      <br><span style="opacity:0.7">${t('quizSource')}: ${escapeHtml(item.source || '—')}</span>
    </div>
    <div class="q-actions" style="margin-top:14px">
      <span class="spacer"></span>
      <button class="btn-primary" onclick="nextQuiz()">${quizState.idx === quizState.items.length - 1 ? t('finishPractice') : t('nextQuestion')}</button>
    </div>`;
}

function nextQuiz() {
  quizState.idx++;
  if (quizState.idx >= quizState.items.length) {
    showQuizScore();
  } else {
    renderQuizQuestion();
    document.getElementById('main').scrollTop = 0;
  }
}

function showQuizScore() {
  const { score, items } = quizState;
  const ref = currentView.ref;
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-header">
      <h2>${ref.title[lang]}</h2>
    </div>
    <div class="section">
      <div class="score-card">
        <div class="score-num">${score} / ${items.length}</div>
        <div class="score-label">${t('quizCorrect')}</div>
        <p style="color:var(--muted);margin-bottom:24px;font-size:0.9rem">${t('practiceComplete')}</p>
        <div class="score-actions">
          <button class="btn-secondary" onclick="renderQuizSetup(currentView.ref)">${t('backToTopic')}</button>
          <button class="btn-primary" onclick="startQuiz()">${t('tryAgain')}</button>
        </div>
      </div>
    </div>`;
}

// ─── Verse Analysis (I'rab) ───────────────────────────────────────────────────

let lastIrabResult = null;

function renderIrab(ref) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-header">
      <h2>${ref.title[lang]}</h2>
      <p>${ref.desc[lang]}</p>
    </div>
    <div class="section">
      <div class="irab-input">
        <textarea class="irab-textarea" id="irab-input"
          placeholder="${escapeHtml(t('irabPlaceholder'))}"></textarea>
        <div class="irab-actions">
          <button class="btn-secondary" onclick="document.getElementById('irab-input').value=''; document.getElementById('irab-results').innerHTML=''">${t('irabClear')}</button>
          <span class="spacer"></span>
          <button class="btn-primary" id="irab-go" onclick="analyzeVerse()">${t('irabAnalyze')}</button>
        </div>
      </div>
      <div class="irab-results" id="irab-results">${lastIrabResult ? renderIrabResult(lastIrabResult) : ''}</div>
    </div>`;

  document.getElementById('irab-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyzeVerse();
  });
}

async function analyzeVerse() {
  const input = document.getElementById('irab-input');
  const verse = input.value.trim();
  if (!verse) { input.focus(); return; }

  const btn = document.getElementById('irab-go');
  const results = document.getElementById('irab-results');
  btn.disabled = true;
  btn.textContent = t('irabAnalyzing');
  results.innerHTML = `<div class="feedback-box loading"><span class="spinner"></span> ${t('irabAnalyzing')}</div>`;

  try {
    const res = await fetch('/api/irab', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verse, language: lang }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    lastIrabResult = data;
    results.innerHTML = renderIrabResult(data);
  } catch (err) {
    results.innerHTML = `<div class="feedback-box error">Error: ${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = t('irabAnalyze');
  }
}

function renderIrabResult(data) {
  const wordsHtml = (data.words || []).map(w => {
    const refs = (w.lesson_refs || []).map(r => {
      const idx = LESSON_INDEX && LESSON_INDEX[r.lesson_id];
      const title = idx ? (idx.verified_title[lang] || idx.verified_title.en) : r.lesson_id;
      const tooltip = `${r.lesson_id} — ${title}\n${r.reason || ''}`;
      return `<button class="irab-ref-chip" title="${escapeHtml(tooltip)}" onclick="jumpToLesson('${r.lesson_id}')">${escapeHtml(r.lesson_id)} · ${escapeHtml((title || '').slice(0, 28))}${title && title.length > 28 ? '…' : ''}</button>`;
    }).join('');

    const grammarRows = [];
    if (w.type) grammarRows.push([t('irabType'), w.type]);
    if (w.root) grammarRows.push([t('irabRoot'), w.root]);
    if (w.case_mood) grammarRows.push([t('irabCase'), w.case_mood]);
    if (w.role) grammarRows.push([t('irabRole'), w.role]);
    if (w.form) grammarRows.push([t('irabForm'), w.form]);
    const grammarHtml = grammarRows.map(([k, v]) =>
      `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(v)}</dd>`).join('');

    return `<div class="irab-word">
      <div class="irab-word-ar">${escapeHtml(w.ar || '')}</div>
      ${w.transliteration ? `<div class="irab-word-translit">${escapeHtml(w.transliteration)}</div>` : ''}
      ${w.meaning ? `<div class="irab-word-meaning">${escapeHtml(w.meaning)}</div>` : ''}
      ${grammarHtml ? `<dl class="irab-word-grammar">${grammarHtml}</dl>` : ''}
      <div class="irab-refs">
        ${refs || `<span style="color:var(--muted);font-size:0.78rem">${t('irabNoLessons')}</span>`}
      </div>
    </div>`;
  }).join('');

  return `
    ${data.translation ? `<div class="irab-translation"><strong>${t('irabTranslation')}:</strong> ${escapeHtml(data.translation)}</div>` : ''}
    <div class="irab-words">${wordsHtml}</div>
    ${data.overall_notes ? `<div class="irab-notes">${escapeHtml(data.overall_notes)}</div>` : ''}
  `;
}

function jumpToLesson(lessonId) {
  // lessonId looks like "L1W4" → level=1, week=4 → idx=3
  const m = /^L(\d)W(\d+)$/.exec(lessonId);
  if (!m) return;
  const levelId = `level${m[1]}`;
  const weekIdx = parseInt(m[2]) - 1;
  if (LEVELS.find(l => l.id === levelId)?.lessons[weekIdx]) {
    clickLesson(levelId, weekIdx);
  }
}

// ─── Utils ────────────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ─── Init ─────────────────────────────────────────────────────────────────────

renderSidebar();
</script>
