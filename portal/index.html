<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quranic Arabic Learning Portal</title>
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2d8f55;
    --green-pale: #e8f5ee;
    --gold: #c9a84c;
    --gold-light: #f0d898;
    --dark: #1a1a1a;
    --mid: #444;
    --muted: #888;
    --bg: #f7f5f0;
    --card: #ffffff;
    --border: #e0dbd0;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }
  body.rtl { direction: rtl; }

  /* Nav */
  nav {
    background: var(--green);
    color: white;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .nav-title { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .nav-title .arabic-title { font-size: 1.2rem; color: var(--gold-light); }
  .lang-switcher { display: flex; gap: 6px; }
  .lang-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.4);
    background: transparent; color: white; cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .lang-btn:hover { background: rgba(255,255,255,0.15); }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 600; }

  /* Layout */
  .layout { display: flex; height: calc(100vh - 60px); overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-section {
    padding: 10px 16px 4px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Level header in sidebar */
  .level-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    user-select: none;
  }
  .level-header:hover { background: var(--green-pale); }
  .level-header.active { background: var(--green-pale); border-left-color: var(--green); }
  .level-icon {
    width: 32px; height: 32px; border-radius: 7px;
    background: var(--green-pale); display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: var(--green); flex-shrink: 0; font-weight: bold;
  }
  .level-header.active .level-icon { background: var(--green); color: white; }
  .level-header-text { flex: 1; }
  .level-name { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
  .level-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .chevron {
    font-size: 0.65rem;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(90deg); }

  /* Week items in sidebar */
  .lesson-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 16px 7px 28px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }
  .lesson-item:hover { background: var(--green-pale); }
  .lesson-item.active { background: var(--green-pale); border-left-color: var(--green); }
  .lesson-week-badge {
    font-size: 0.65rem; font-weight: 700; color: var(--green);
    background: var(--green-pale); border-radius: 4px;
    padding: 1px 5px; flex-shrink: 0; margin-top: 1px;
    border: 1px solid rgba(26,107,60,0.2);
  }
  .lesson-item.active .lesson-week-badge { background: var(--green); color: white; }
  .lesson-item-title { font-size: 0.78rem; color: var(--mid); line-height: 1.4; }
  .lesson-item.active .lesson-item-title { color: var(--dark); font-weight: 500; }

  /* Reference items */
  .ref-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer; transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .ref-item:hover { background: var(--green-pale); }
  .ref-item.active { background: var(--green-pale); border-left-color: var(--green); }
  .ref-icon {
    width: 32px; height: 32px; border-radius: 7px;
    background: #fef9ee; display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; color: var(--gold); flex-shrink: 0; font-weight: bold;
    border: 1px solid #f0dfa0;
  }
  .ref-item.active .ref-icon { background: var(--gold); color: white; border-color: var(--gold); }
  .ref-name { font-size: 0.85rem; font-weight: 500; }

  /* Main content */
  .main { flex: 1; overflow-y: auto; padding: 0; }

  /* Welcome screen */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; padding: 40px; text-align: center;
  }
  .welcome-bismillah { font-size: 2rem; color: var(--green); margin-bottom: 16px; font-family: serif; }
  .welcome h1 { font-size: 1.6rem; color: var(--dark); margin-bottom: 12px; }
  .welcome p { color: var(--muted); max-width: 440px; line-height: 1.7; }

  /* Section header in main */
  .topic-header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
    color: white; padding: 28px 32px;
  }
  .topic-header h2 { font-size: 1.4rem; margin-bottom: 6px; }
  .topic-header p { opacity: 0.85; font-size: 0.9rem; line-height: 1.6; }
  .topic-header .week-num {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.7; margin-bottom: 6px;
  }

  .section { padding: 24px 32px; }
  .section-title {
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Level overview — lesson cards grid */
  .lesson-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .lesson-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lesson-card:hover { border-color: var(--green); box-shadow: var(--shadow); transform: translateY(-1px); }
  .lesson-card-week {
    font-size: 0.68rem; font-weight: 700; color: var(--green);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .lesson-card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.4; color: var(--dark); }
  .lesson-card-arrow { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* PDF grid */
  .pdf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .pdf-card {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
    text-decoration: none; color: var(--dark);
    transition: all 0.15s;
  }
  .pdf-card:hover { border-color: var(--green); box-shadow: var(--shadow); transform: translateY(-1px); }
  .pdf-icon { font-size: 1.4rem; flex-shrink: 0; }
  .pdf-name { font-size: 0.84rem; font-weight: 500; line-height: 1.3; }

  /* Practice section */
  .practice-start {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; text-align: center;
    box-shadow: var(--shadow);
  }
  .practice-start h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--green); }
  .practice-start p { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
  .btn-primary {
    background: var(--green); color: white; border: none;
    padding: 12px 28px; border-radius: 24px; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent; color: var(--green); border: 1.5px solid var(--green);
    padding: 10px 22px; border-radius: 24px; font-size: 0.9rem;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--green-pale); }

  /* Question card */
  .question-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
  }
  .q-progress { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
  .q-progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .q-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }
  .q-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 14px;
  }
  .badge-translation { background: #e8f0fe; color: #1a56db; }
  .badge-grammar { background: #fef3e2; color: #b45309; }
  .badge-vocabulary { background: #f0fdf4; color: #166534; }
  .badge-pronunciation { background: #fdf4ff; color: #7c3aed; }
  .badge-factual { background: #f1f5f9; color: #475569; }

  .q-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
  .answer-area {
    width: 100%; min-height: 80px; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.95rem; resize: vertical; font-family: inherit;
    line-height: 1.6; transition: border-color 0.2s;
  }
  .answer-area:focus { outline: none; border-color: var(--green); }
  .q-actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
  .q-actions .spacer { flex: 1; }

  /* Feedback */
  .feedback-box {
    margin-top: 20px; padding: 16px 18px;
    border-radius: 8px; border-left: 4px solid var(--green);
    background: var(--green-pale); font-size: 0.92rem; line-height: 1.7;
    white-space: pre-wrap;
  }
  .feedback-box.loading { color: var(--muted); font-style: italic; }
  .feedback-box.error { border-color: #dc2626; background: #fef2f2; color: #991b1b; }
  .feedback-arabic { font-size: 1.2rem; font-family: 'Noto Naskh Arabic', serif; direction: rtl; }

  /* Score card */
  .score-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px; text-align: center;
    box-shadow: var(--shadow);
  }
  .score-num { font-size: 3.5rem; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 8px; }
  .score-label { font-size: 1rem; color: var(--muted); margin-bottom: 24px; }
  .score-actions { display: flex; gap: 12px; justify-content: center; }

  /* Spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RTL adjustments */
  body.rtl .sidebar { border-right: none; border-left: 1px solid var(--border); }
  body.rtl .level-header,
  body.rtl .lesson-item,
  body.rtl .ref-item { border-left: none; border-right: 3px solid transparent; }
  body.rtl .level-header.active,
  body.rtl .lesson-item.active,
  body.rtl .ref-item.active { border-right-color: var(--green); }
  body.rtl .lesson-item { padding: 7px 28px 7px 16px; }
  body.rtl .feedback-box { border-left: none; border-right: 4px solid var(--green); }
  body.rtl .section-title::after { display: none; }
  body.rtl .section-title::before { content: ''; flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 700px) {
    .sidebar { width: 240px; min-width: 240px; }
    .section { padding: 16px; }
    .topic-header { padding: 20px 16px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-title">
    <span class="arabic-title">بِسْمِ اللَّهِ</span>
    <span id="nav-label">Quranic Arabic</span>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('tr')">TR</button>
    <button class="lang-btn" onclick="setLang('ar')">AR</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      <h1 id="welcome-h1">Quranic Arabic Learning Portal</h1>
      <p id="welcome-p">Select a level from the sidebar to explore its lessons, or choose a reference topic to browse vocabulary and grammar materials.</p>
    </div>
  </main>
</div>

<script src="data.js"></script>
<script>
// ─── i18n ─────────────────────────────────────────────────────────────────────

const I18N = {
  en: {
    navLabel: 'Quranic Arabic',
    welcomeH1: 'Quranic Arabic Learning Portal',
    welcomeP: 'Select a level from the sidebar to explore its lessons, or choose a reference topic to browse vocabulary and grammar materials.',
    groupLessons: 'Course Levels',
    groupReference: 'Reference Materials',
    week: 'Week',
    lessons: 'Lessons',
    materials: 'Study Materials',
    practice: 'Practice Questions',
    practiceDesc: n => `Test your understanding with ${n} practice questions. Claude will review your answers and explain any grammatical points.`,
    startPractice: 'Start Practice',
    question: 'Question',
    of: 'of',
    submitAnswer: 'Submit Answer',
    nextQuestion: 'Next Question',
    finishPractice: 'Finish',
    yourAnswer: 'Your answer...',
    thinking: 'Evaluating your answer...',
    practiceComplete: 'Practice Complete!',
    questionsAnswered: 'questions answered',
    tryAgain: 'Try Again',
    backToTopic: 'Back to Lesson',
    openPDF: 'Open PDF',
    levelOverview: 'All Lessons',
    noPractice: 'No practice questions for this topic.',
  },
  tr: {
    navLabel: 'Kuran Arapçası',
    welcomeH1: 'Kuran Arapçası Öğrenme Portalı',
    welcomeP: 'Derslerini keşfetmek için kenar çubuğundan bir seviye seçin veya kelime ve dilbilgisi materyallerine göz atmak için referans konusu seçin.',
    groupLessons: 'Kurs Seviyeleri',
    groupReference: 'Referans Materyalleri',
    week: 'Hafta',
    lessons: 'Dersler',
    materials: 'Çalışma Materyalleri',
    practice: 'Alıştırma Soruları',
    practiceDesc: n => `${n} alıştırma sorusuyla anlayışınızı test edin. Claude cevaplarınızı değerlendirecek ve gramer noktalarını açıklayacak.`,
    startPractice: 'Alıştırmayı Başlat',
    question: 'Soru',
    of: '/',
    submitAnswer: 'Cevabı Gönder',
    nextQuestion: 'Sonraki Soru',
    finishPractice: 'Bitir',
    yourAnswer: 'Cevabınız...',
    thinking: 'Cevabınız değerlendiriliyor...',
    practiceComplete: 'Alıştırma Tamamlandı!',
    questionsAnswered: 'soru cevaplandı',
    tryAgain: 'Tekrar Dene',
    backToTopic: 'Derse Dön',
    openPDF: 'PDF Aç',
    levelOverview: 'Tüm Dersler',
    noPractice: 'Bu konu için alıştırma sorusu yok.',
  },
  ar: {
    navLabel: 'العربية القرآنية',
    welcomeH1: 'بوابة تعلم العربية القرآنية',
    welcomeP: 'اختر مستوى من القائمة الجانبية لاستكشاف دروسه، أو اختر موضوعاً مرجعياً لتصفح مواد المفردات والنحو.',
    groupLessons: 'مستويات الدورة',
    groupReference: 'المواد المرجعية',
    week: 'الأسبوع',
    lessons: 'الدروس',
    materials: 'المواد الدراسية',
    practice: 'أسئلة التدريب',
    practiceDesc: n => `اختبر فهمك بـ ${n} أسئلة تدريبية. سيراجع كلود إجاباتك ويشرح النقاط النحوية.`,
    startPractice: 'ابدأ التدريب',
    question: 'سؤال',
    of: 'من',
    submitAnswer: 'أرسل الإجابة',
    nextQuestion: 'السؤال التالي',
    finishPractice: 'إنهاء',
    yourAnswer: 'إجابتك...',
    thinking: 'جارٍ تقييم إجابتك...',
    practiceComplete: 'اكتمل التدريب!',
    questionsAnswered: 'أسئلة تمت الإجابة عنها',
    tryAgain: 'حاول مجدداً',
    backToTopic: 'العودة للدرس',
    openPDF: 'فتح PDF',
    levelOverview: 'جميع الدروس',
    noPractice: 'لا توجد أسئلة تدريبية لهذا الموضوع.',
  },
};

const t = key => I18N[lang][key];

// ─── State ────────────────────────────────────────────────────────────────────

let lang = 'en';
let expandedLevel = null;
let currentView = null; // { type: 'level'|'lesson'|'reference', level, lesson, ref }
let practiceMode = false;
let questionIndex = 0;

// ─── Language ─────────────────────────────────────────────────────────────────

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.documentElement.lang = l;
  document.body.classList.toggle('rtl', l === 'ar');
  document.getElementById('nav-label').textContent = I18N[l].navLabel;
  renderSidebar();
  if (!currentView) {
    document.getElementById('welcome-h1').textContent = I18N[l].welcomeH1;
    document.getElementById('welcome-p').textContent = I18N[l].welcomeP;
  } else if (currentView.type === 'level') {
    renderLevelOverview(currentView.level);
  } else if (currentView.type === 'lesson') {
    if (practiceMode) renderPractice();
    else renderLesson(currentView.level, currentView.lesson);
  } else if (currentView.type === 'reference') {
    renderReference(currentView.ref);
  }
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────

function renderSidebar() {
  const levelIcons = { level1: '١', level2: '٢', level3: '٣' };
  let html = '';

  html += `<div class="sidebar-section">${t('groupLessons')}</div>`;

  for (const level of LEVELS) {
    const isExpanded = expandedLevel === level.id;
    const isActive = currentView && currentView.type === 'level' && currentView.level && currentView.level.id === level.id;
    html += `
      <div class="level-header ${isActive && !currentView.lesson ? 'active' : ''}" onclick="clickLevel('${level.id}')">
        <div class="level-icon">${levelIcons[level.id]}</div>
        <div class="level-header-text">
          <div class="level-name">${level.title[lang]}</div>
          <div class="level-sub">${level.lessons.length} ${t('lessons')}</div>
        </div>
        <div class="chevron ${isExpanded ? 'open' : ''}">▸</div>
      </div>`;

    if (isExpanded) {
      for (let i = 0; i < level.lessons.length; i++) {
        const lesson = level.lessons[i];
        const isLessonActive = currentView && currentView.type === 'lesson' && currentView.lesson === lesson;
        html += `
          <div class="lesson-item ${isLessonActive ? 'active' : ''}" onclick="clickLesson('${level.id}', ${i})">
            <div class="lesson-week-badge">${t('week')} ${lesson.week}</div>
            <div class="lesson-item-title">${lesson.title[lang]}</div>
          </div>`;
      }
    }
  }

  html += `<div class="sidebar-section" style="margin-top:8px">${t('groupReference')}</div>`;

  for (const ref of REFERENCE_TOPICS) {
    const isActive = currentView && currentView.type === 'reference' && currentView.ref && currentView.ref.id === ref.id;
    html += `
      <div class="ref-item ${isActive ? 'active' : ''}" onclick="clickReference('${ref.id}')">
        <div class="ref-icon">${ref.icon}</div>
        <div class="ref-name">${ref.title[lang]}</div>
      </div>`;
  }

  document.getElementById('sidebar').innerHTML = html;
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function clickLevel(levelId) {
  const level = LEVELS.find(l => l.id === levelId);
  if (expandedLevel === levelId) {
    expandedLevel = null;
    currentView = null;
    renderSidebar();
    showWelcome();
  } else {
    expandedLevel = levelId;
    currentView = { type: 'level', level };
    practiceMode = false;
    renderSidebar();
    renderLevelOverview(level);
  }
}

function clickLesson(levelId, index) {
  const level = LEVELS.find(l => l.id === levelId);
  const lesson = level.lessons[index];
  expandedLevel = levelId;
  currentView = { type: 'lesson', level, lesson };
  practiceMode = false;
  questionIndex = 0;
  renderSidebar();
  renderLesson(level, lesson);
}

function clickReference(refId) {
  const ref = REFERENCE_TOPICS.find(r => r.id === refId);
  expandedLevel = null;
  currentView = { type: 'reference', ref };
  practiceMode = false;
  renderSidebar();
  renderReference(ref);
}

// ─── Views ────────────────────────────────────────────────────────────────────

function showWelcome() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="welcome">
      <div class="welcome-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      <h1>${I18N[lang].welcomeH1}</h1>
      <p>${I18N[lang].welcomeP}</p>
    </div>`;
}

function renderLevelOverview(level) {
  const main = document.getElementById('main');
  const levelIndex = LEVELS.indexOf(level);
  const startWeek = levelIndex * 14 + 1;

  const cardsHtml = level.lessons.map((lesson, i) => `
    <div class="lesson-card" onclick="clickLesson('${level.id}', ${i})">
      <div class="lesson-card-week">${t('week')} ${lesson.week}</div>
      <div class="lesson-card-title">${lesson.title[lang]}</div>
      <div class="lesson-card-arrow">→ ${t('openPDF')} &amp; ${t('practice')}</div>
    </div>`).join('');

  main.innerHTML = `
    <div class="topic-header">
      <h2>${level.title[lang]}</h2>
      <p>${level.desc[lang]}</p>
    </div>
    <div class="section">
      <div class="section-title">${t('levelOverview')}</div>
      <div class="lesson-cards-grid">${cardsHtml}</div>
    </div>`;
}

function renderLesson(level, lesson) {
  const main = document.getElementById('main');
  const levelIndex = LEVELS.indexOf(level);

  const encodedPath = lesson.pdf.split('/').map(encodeURIComponent).join('/');
  const pdfHtml = `
    <a class="pdf-card" href="/pdfs/${encodedPath}" target="_blank" rel="noopener">
      <span class="pdf-icon">📄</span>
      <span class="pdf-name">${t('week')} ${lesson.week} — ${lesson.title[lang]}</span>
    </a>`;

  const practiceHtml = lesson.questions && lesson.questions.length > 0
    ? `<div class="practice-start">
        <h3>${t('practice')}</h3>
        <p>${t('practiceDesc')(lesson.questions.length)}</p>
        <button class="btn-primary" onclick="startPractice()">${t('startPractice')}</button>
      </div>`
    : `<p style="color:var(--muted);font-size:0.9rem">${t('noPractice')}</p>`;

  main.innerHTML = `
    <div class="topic-header">
      <div class="week-num">${level.title[lang]} · ${t('week')} ${lesson.week}</div>
      <h2>${lesson.title[lang]}</h2>
    </div>
    <div class="section">
      <div class="section-title">${t('materials')}</div>
      <div class="pdf-grid">${pdfHtml}</div>
    </div>
    <div class="section">
      <div class="section-title">${t('practice')}</div>
      ${practiceHtml}
    </div>`;
}

function renderReference(ref) {
  const main = document.getElementById('main');
  const pdfsHtml = ref.pdfs.map(pdf => {
    const encodedPath = pdf.path.split('/').map(encodeURIComponent).join('/');
    return `<a class="pdf-card" href="/pdfs/${encodedPath}" target="_blank" rel="noopener">
      <span class="pdf-icon">📄</span>
      <span class="pdf-name">${pdf.name[lang]}</span>
    </a>`;
  }).join('');

  main.innerHTML = `
    <div class="topic-header">
      <h2>${ref.title[lang]}</h2>
      <p>${ref.desc[lang]}</p>
    </div>
    <div class="section">
      <div class="section-title">${t('materials')}</div>
      <div class="pdf-grid">${pdfsHtml}</div>
    </div>`;
}

// ─── Practice ─────────────────────────────────────────────────────────────────

function startPractice() {
  practiceMode = true;
  questionIndex = 0;
  renderPractice();
}

function renderPractice() {
  const lesson = currentView.lesson;
  const q = lesson.questions[questionIndex];
  const total = lesson.questions.length;
  const pct = Math.round((questionIndex / total) * 100);
  const level = currentView.level;

  const badgeClass = {
    translation: 'badge-translation',
    grammar: 'badge-grammar',
    vocabulary: 'badge-vocabulary',
    pronunciation: 'badge-pronunciation',
    factual: 'badge-factual',
  }[q.type] || 'badge-factual';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-header">
      <div class="week-num">${level.title[lang]} · ${t('week')} ${lesson.week}</div>
      <h2>${lesson.title[lang]}</h2>
      <p>${t('practice')}</p>
    </div>
    <div class="section">
      <div class="question-card">
        <div class="q-progress">${t('question')} ${questionIndex + 1} ${t('of')} ${total}</div>
        <div class="q-progress-bar"><div class="q-progress-fill" style="width:${pct}%"></div></div>
        <span class="q-badge ${badgeClass}">${q.type}</span>
        <div class="q-text">${escapeHtml(q.q)}</div>
        <textarea class="answer-area" id="answer-input" placeholder="${t('yourAnswer')}"></textarea>
        <div class="q-actions">
          <button class="btn-secondary" onclick="backToLesson()">${t('backToTopic')}</button>
          <span class="spacer"></span>
          <button class="btn-primary" id="submit-btn" onclick="submitAnswer()">${t('submitAnswer')}</button>
        </div>
        <div id="feedback-area"></div>
        <div id="next-area"></div>
      </div>
    </div>`;

  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) submitAnswer();
  });
}

async function submitAnswer() {
  const answerEl = document.getElementById('answer-input');
  const answer = answerEl.value.trim();
  if (!answer) { answerEl.focus(); return; }

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  answerEl.disabled = true;

  const feedbackArea = document.getElementById('feedback-area');
  feedbackArea.innerHTML = `<div class="feedback-box loading"><span class="spinner"></span> ${t('thinking')}</div>`;

  const lesson = currentView.lesson;
  const level = currentView.level;
  const q = lesson.questions[questionIndex];

  try {
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q.q,
        answer,
        expected: q.expected,
        topic: `${level.title['en']} — Week ${lesson.week}: ${lesson.title['en']}`,
        language: lang,
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    feedbackArea.innerHTML = `<div class="feedback-box ${lang === 'ar' ? 'feedback-arabic' : ''}">${escapeHtml(data.feedback)}</div>`;
  } catch (err) {
    feedbackArea.innerHTML = `<div class="feedback-box error">Error: ${escapeHtml(err.message)}</div>`;
  }

  const isLast = questionIndex === lesson.questions.length - 1;
  const nextArea = document.getElementById('next-area');
  nextArea.innerHTML = `<div class="q-actions" style="margin-top:16px">
    <span class="spacer"></span>
    <button class="btn-primary" onclick="${isLast ? 'showScore()' : 'nextQuestion()'}">${isLast ? t('finishPractice') : t('nextQuestion')}</button>
  </div>`;
}

function nextQuestion() {
  questionIndex++;
  renderPractice();
  document.getElementById('main').scrollTop = 0;
}

function showScore() {
  const lesson = currentView.lesson;
  const level = currentView.level;
  const total = lesson.questions.length;
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-header">
      <div class="week-num">${level.title[lang]} · ${t('week')} ${lesson.week}</div>
      <h2>${lesson.title[lang]}</h2>
    </div>
    <div class="section">
      <div class="score-card">
        <div class="score-num">${total}</div>
        <div class="score-label">${t('questionsAnswered')}</div>
        <p style="color:var(--muted);margin-bottom:24px;font-size:0.9rem">${t('practiceComplete')}</p>
        <div class="score-actions">
          <button class="btn-secondary" onclick="backToLesson()">${t('backToTopic')}</button>
          <button class="btn-primary" onclick="startPractice()">${t('tryAgain')}</button>
        </div>
      </div>
    </div>`;
}

function backToLesson() {
  practiceMode = false;
  renderLesson(currentView.level, currentView.lesson);
}

// ─── Utils ────────────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ─── Init ─────────────────────────────────────────────────────────────────────

renderSidebar();
</script>
</body>
</html>
